<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Requests - Blood Bridge</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">🩸 Blood Bridge</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="find-donor.html">Find Donor</a></li>
        <li><a href="requests.html">Requests</a></li>
        <li><a href="blood-info.html">Blood Info</a></li>
      </ul>
    </div>
  </nav>

  <section class="requests-section">
    <div class="container">
      <div class="requests-layout">
        <div class="post-request">
          <h2>Post a Blood Request</h2>
          <form id="requestForm">
            <div class="form-group">
              <label for="patient_name">Patient Name *</label>
              <input type="text" id="patient_name" name="patient_name" required>
            </div>
            <div class="form-group">
              <label for="blood_group">Blood Group *</label>
              <select id="blood_group" name="blood_group" required>
                <option value="">Select Blood Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
              </select>
            </div>
            <div class="form-group">
              <label for="city">City *</label>
              <input type="text" id="city" name="city" required>
            </div>
            <div class="form-group">
              <label for="contact">Contact Number *</label>
              <input type="tel" id="contact" name="contact" required>
            </div>
            <div class="form-group">
              <label for="hospital">Hospital Name</label>
              <input type="text" id="hospital" name="hospital">
            </div>
            <div class="form-group">
              <label for="urgency">Urgency</label>
              <select id="urgency" name="urgency">
                <option value="Normal">Normal</option>
                <option value="Urgent">Urgent</option>
                <option value="Critical">Critical</option>
              </select>
            </div>
            <input type="hidden" id="latitude" name="latitude">
            <input type="hidden" id="longitude" name="longitude">
            <button type="submit" class="btn btn-primary">Post Request</button>
          </form>
          <div id="message" class="message"></div>
        </div>
        <div class="live-requests">
          <h2>Live Blood Requests</h2>
          <div id="requestsFeed" class="requests-feed"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>Emergency Helpline: 104</p>
      <p>&copy; 2024 Blood Bridge. All rights reserved. | Made by Ankit Daila</p>
    </div>
  </footer>

  <script src="js/requests.js"></script>
</body>
</html>
